<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <!-- Gradient for the neural threads -->
    <linearGradient id="threadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse filter -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0d1117" rx="8"/>

  <!-- Left side: human figure (abstracted as neural constellation) -->
  <g transform="translate(120, 100)" filter="url(#glow)">
    <!-- Head node -->
    <circle cx="0" cy="-50" r="4" fill="#e2e8f0" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Shoulder nodes -->
    <circle cx="-20" cy="-30" r="3" fill="#e2e8f0" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-30" r="3" fill="#e2e8f0" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Core nodes -->
    <circle cx="0" cy="-10" r="3.5" fill="#e2e8f0" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-15" cy="10" r="2.5" fill="#e2e8f0" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="10" r="2.5" fill="#e2e8f0" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <!-- Lower nodes -->
    <circle cx="-10" cy="35" r="2" fill="#e2e8f0" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="35" r="2" fill="#e2e8f0" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Connection lines (skeleton) -->
    <line x1="0" y1="-50" x2="-20" y2="-30" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-50" x2="20" y2="-30" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="-20" y1="-30" x2="0" y2="-10" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="20" y1="-30" x2="0" y2="-10" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-10" x2="-15" y2="10" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-10" x2="15" y2="10" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="-15" y1="10" x2="-10" y2="35" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
    <line x1="15" y1="10" x2="10" y2="35" stroke="#e2e8f0" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Middle: cocoon threads flowing from human to AI -->
  <g filter="url(#softglow)">
    <!-- Thread 1 -->
    <path d="M 160 60 C 250 40, 350 50, 400 70 C 450 90, 520 55, 600 65" stroke="url(#threadGrad)" stroke-width="1.5" fill="none" opacity="0.7">
      <animate attributeName="d"
        values="M 160 60 C 250 40, 350 50, 400 70 C 450 90, 520 55, 600 65;
                M 160 58 C 250 45, 340 55, 400 65 C 460 85, 530 50, 600 62;
                M 160 60 C 250 40, 350 50, 400 70 C 450 90, 520 55, 600 65"
        dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- Thread 2 -->
    <path d="M 155 80 C 230 70, 320 90, 400 85 C 480 80, 540 75, 610 80" stroke="url(#threadGrad)" stroke-width="1.2" fill="none" opacity="0.5">
      <animate attributeName="d"
        values="M 155 80 C 230 70, 320 90, 400 85 C 480 80, 540 75, 610 80;
                M 155 82 C 230 75, 330 85, 400 90 C 470 85, 545 80, 610 78;
                M 155 80 C 230 70, 320 90, 400 85 C 480 80, 540 75, 610 80"
        dur="7s" repeatCount="indefinite"/>
    </path>
    <!-- Thread 3 -->
    <path d="M 150 100 C 250 110, 350 95, 400 100 C 450 105, 530 100, 620 95" stroke="url(#threadGrad)" stroke-width="1.8" fill="none" opacity="0.6">
      <animate attributeName="d"
        values="M 150 100 C 250 110, 350 95, 400 100 C 450 105, 530 100, 620 95;
                M 150 102 C 250 105, 345 100, 400 105 C 455 100, 525 105, 620 98;
                M 150 100 C 250 110, 350 95, 400 100 C 450 105, 530 100, 620 95"
        dur="5s" repeatCount="indefinite"/>
    </path>
    <!-- Thread 4 -->
    <path d="M 155 120 C 240 130, 340 115, 400 120 C 460 125, 540 110, 615 115" stroke="url(#threadGrad)" stroke-width="1" fill="none" opacity="0.4">
      <animate attributeName="d"
        values="M 155 120 C 240 130, 340 115, 400 120 C 460 125, 540 110, 615 115;
                M 155 118 C 240 125, 345 120, 400 115 C 455 120, 535 115, 615 118;
                M 155 120 C 240 130, 340 115, 400 120 C 460 125, 540 110, 615 115"
        dur="8s" repeatCount="indefinite"/>
    </path>
    <!-- Thread 5 -->
    <path d="M 160 140 C 260 145, 350 130, 400 135 C 450 140, 520 130, 605 130" stroke="url(#threadGrad)" stroke-width="1.3" fill="none" opacity="0.5">
      <animate attributeName="d"
        values="M 160 140 C 260 145, 350 130, 400 135 C 450 140, 520 130, 605 130;
                M 160 138 C 260 140, 355 135, 400 130 C 445 135, 525 135, 605 133;
                M 160 140 C 260 145, 350 130, 400 135 C 450 140, 520 130, 605 130"
        dur="6.5s" repeatCount="indefinite"/>
    </path>

    <!-- Traveling particles along threads -->
    <circle r="2" fill="#a78bfa" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 160 60 C 250 40, 350 50, 400 70 C 450 90, 520 55, 600 65"/>
    </circle>
    <circle r="1.5" fill="#8b5cf6" opacity="0.7">
      <animateMotion dur="5s" repeatCount="indefinite" path="M 150 100 C 250 110, 350 95, 400 100 C 450 105, 530 100, 620 95"/>
    </circle>
    <circle r="1.8" fill="#c4b5fd" opacity="0.6">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 160 140 C 260 145, 350 130, 400 135 C 450 140, 520 130, 605 130"/>
    </circle>
  </g>

  <!-- Right side: AI cocoon (forming neural network) -->
  <g transform="translate(660, 100)" filter="url(#softglow)">
    <!-- Cocoon shell (ellipse) -->
    <ellipse cx="0" cy="0" rx="55" ry="65" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3">
      <animate attributeName="rx" values="55;57;55" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="65;67;65" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="45" ry="55" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.2">
      <animate attributeName="rx" values="45;43;45" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="55;53;55" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Inner neural network forming -->
    <!-- Central core -->
    <circle cx="0" cy="0" r="5" fill="#a78bfa" opacity="0.9">
      <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Layer 1 nodes -->
    <circle cx="-18" cy="-15" r="3" fill="#8b5cf6" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="-15" r="3" fill="#8b5cf6" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="15" r="3" fill="#8b5cf6" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="15" r="3" fill="#8b5cf6" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-25" r="2.5" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="25" r="2.5" fill="#8b5cf6" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.7s" repeatCount="indefinite"/>
    </circle>

    <!-- Layer 2 nodes (outer) -->
    <circle cx="-30" cy="0" r="2" fill="#6366f1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="0" r="2" fill="#6366f1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-12" cy="-35" r="2" fill="#6366f1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="-35" r="2" fill="#6366f1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-12" cy="35" r="2" fill="#6366f1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="35" r="2" fill="#6366f1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Neural connections (inner) -->
    <line x1="0" y1="0" x2="-18" y2="-15" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="0" x2="18" y2="-15" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="0" x2="-20" y2="15" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="0" x2="20" y2="15" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="25" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#a78bfa" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#a78bfa" stroke-width="0.4" opacity="0.3"/>

    <!-- Cross connections -->
    <line x1="-18" y1="-15" x2="0" y2="-25" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="18" y1="-15" x2="0" y2="-25" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="-20" y1="15" x2="0" y2="25" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="20" y1="15" x2="0" y2="25" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="-18" y1="-15" x2="-30" y2="0" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="18" y1="-15" x2="30" y2="0" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="-20" y1="15" x2="-30" y2="0" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
    <line x1="20" y1="15" x2="30" y2="0" stroke="#8b5cf6" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- Subtle text -->
  <text x="400" y="185" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="11" opacity="0.4">
    intelligence in transit
  </text>
</svg>
